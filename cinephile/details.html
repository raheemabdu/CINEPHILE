<!-- details.html -->
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie Details</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

::-webkit-scrollbar{
display:none;
}

body{
background:#1a1a1a;
color:white;
font-family:Arial;
overflow-x:hidden;
}

.overlay{
background:linear-gradient(to top,#0D0D0D 5%,rgba(0,0,0,.4),transparent);
}

.cast-scroll::-webkit-scrollbar{
display:none;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<header class="w-full fixed top-0 left-0 z-50 bg-[#0E0E0E]/95 backdrop-blur border-b border-[#1A1A1A]">

<div class="max-w-[1400px] mx-auto px-10 py-5 flex items-center justify-between">

<!-- LEFT -->
<div class="flex items-center gap-12">

<h1 class="text-[#CC0000] text-3xl font-black tracking-wider">
CINEPHILE
</h1>

<nav class="flex items-center gap-8 text-sm">

<a href="index.html"
class="text-[#CC0000] font-semibold border-b border-[#CC0000] pb-1">
Home
</a>

<a href="favourites.html"
class="text-[#AAAAAA] hover:text-white transition">
Favourites
</a>

</nav>

</div>

<!-- RIGHT -->
<div class="flex items-center gap-5">

<button class="text-[#AAAAAA] hover:text-white text-lg">
🔍
</button>

<button class="text-[#AAAAAA] hover:text-white text-lg">
👤
</button>

</div>

</div>

</header>

<!-- HERO -->
<section id="hero"
class="min-h-screen bg-cover bg-center relative flex items-end pt-32">

<div class="absolute inset-0 overlay"></div>

<div
class="relative z-10 max-w-[1400px] mx-auto px-10 pb-20 grid lg:grid-cols-2 gap-14 items-end">

<!-- LEFT SIDE -->
<div>

<img
id="poster"
src=""
class="w-full max-w-[350px] rounded-2xl shadow-2xl border border-[#222]">

</div>

<!-- RIGHT SIDE -->
<div>

<!-- MOVIE TITLE -->
<h1
id="title"
class="text-5xl md:text-7xl font-black leading-tight uppercase">
Loading...
</h1>

<!-- MOVIE INFO -->
<div class="flex flex-wrap items-center gap-6 mt-5 text-[#BBBBBB] text-sm">

<p id="rating"></p>

<p id="year"></p>

<p id="runtime"></p>

<div id="genres" class="flex gap-2 flex-wrap"></div>

</div>

<!-- BUTTONS -->
<div class="flex flex-wrap gap-4 mt-8">

<button
class="bg-[#CC0000] hover:bg-red-700 transition px-8 py-4 rounded-lg font-semibold">

▶ Watch Now

</button>

<button
id="favBtn"
class="bg-[#1A1A1A] hover:bg-[#2A2A2A] transition px-8 py-4 rounded-lg font-semibold">

❤ Add To Favourites

</button>

</div>


<!-- OVERVIEW -->
<div class="mt-10">

<h2 class="text-2xl font-bold mb-4">
The Storyline
</h2>

<p
id="overview"
class="text-[#DDDDDD] leading-8 max-w-3xl">
</p>

</div>

<!-- CAST -->
<div class="mt-12">

<h2 class="text-2xl font-bold mb-6">
Top Cast
</h2>

<div
id="castContainer"
class="flex gap-6 overflow-x-auto cast-scroll pb-4">
</div>

</div>

</div>

</div>

</section>

<!-- FOOTER -->
<footer class="border-t border-[#1A1A1A] bg-[#0E0E0E]">

<div
class="max-w-[1400px] mx-auto px-10 py-12 flex flex-col md:flex-row justify-between items-center gap-8">

<div>

<h2 class="text-[#CC0000] text-2xl font-black">
CINEPHILE
</h2>

<p class="text-[#666] text-sm mt-2">
© 2026 Cinephile. All rights reserved.
</p>

</div>

<div class="flex gap-8 text-[#AAAAAA] text-sm">

<a href="#">API Credits</a>
<a href="#">Terms</a>
<a href="#">Privacy</a>
<a href="#">Support</a>

</div>

<div class="flex gap-4 text-xl">

<span>🌐</span>
<span>🎬</span>

</div>

</div>

</footer>

<script src="../js/api.js"></script>
<script src="../js/details.js"></script>

</body>
</html>
