<style>

body{
background:#1a1a1a;

}

.movie-card{

border-radius:10px;
overflow:hidden;
transition:.3s;
}

.movie-card:hover{
transform:scale(1.03);
}

.movie-card img{
width:100%;
height:300px;
object-fit:cover;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<header class="w-full fixed top-0 left-0 z-50 bg-[#0E0E0E]/95 backdrop-blur border-b border-[#1A1A1A]">

<div class="max-w-[1400px] mx-auto px-10 py-5 flex items-center justify-between">

<!-- LEFT -->
<div class="flex items-center gap-12">

<h1 class="text-[#CC0000] text-3xl font-black tracking-wider">
CINEPHILE
</h1>

<nav class="flex items-center gap-8 text-sm">

<a href="./index.html"
class="text-[#AAAAAA] hover:text-white transition">
Home
</a>

<a href="./favourites.html"
class="text-[#CC0000] font-semibold border-b border-[#CC0000] pb-1">
Favourites
</a>

</nav>

</div>

<!-- RIGHT -->
<div class="flex items-center gap-5">

<button class="text-[#AAAAAA] hover:text-white text-lg">
🔍
</button>

<button class="text-[#AAAAAA] hover:text-white text-lg">
👤
</button>

</div>

</div>

</header>

<section class="pt-36 px-10 min-h-screen">

<div class="flex items-center justify-between mb-10">

<div>

<h1 class="text-5xl font-black">
Your Favourites
</h1>

<p class="text-[#AAAAAA] mt-3">
curated selection of your most loved films and cinematic experiences <br/>
relive the magic at any time
</p>

</div>

<div
class="bg-[#1E1E1E] px-5 py-3 rounded-full text-sm">

<div
id="favContainer"
class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">

<!-- FOOTER -->
<footer class="mt-24 border-t border-[#1A1A1A] bg-[#0E0E0E]">

<div
class="max-w-[1400px] mx-auto px-10 py-12 flex flex-col md:flex-row justify-between items-center gap-8">

CINEPHILE

<a href="#">Privacy</a>

window.addEventListener("load", () => {

});
